[job-exec "futbol-daily"]
schedule = 0 8 * * *
container = walactv-futboltv
command = python main.py
no-overlap = true

[job-exec "iptv-sync"]
schedule = @every 6h
container = walactv-sync-iptv
command = /bin/sh -ec "python scripts/sync_iptv.py && python scripts/poblar_mapeo_canales.py"
no-overlap = true

[job-exec "sync-replays"]
schedule = 0 12 * * *
container = walactv-sync-replays
command = python scripts/sync_replays.py
no-overlap = true
