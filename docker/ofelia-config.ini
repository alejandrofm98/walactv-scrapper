[job-exec "futbol-daily"]
schedule = 0 8 * * *
container = walactv-futboltv
command = python main.py
no-overlap = true

[job-exec "iptv-sync"]
schedule = @every 6h
container = walactv-sync-iptv
command = /app/run-sync.sh
no-overlap = true

[job-exec "sync-replays"]
schedule = 0 12 * * *
container = walactv-sync-replays
command = python iptv_scrapper/sync_replays.py
no-overlap = true

[job-exec "tmdb-metadata-sync"]
schedule = 30 3,9,15,21 * * *
container = walactv-sync-tmdb-metadata
command = python iptv_scrapper/scrape_tmdb_metadata.py --batch-size 100
no-overlap = true

# IMDb ratings: 06:00 UTC daily (separado de tmdb-metadata 03:30/09:30/15:30/21:30 para evitar contention)
[job-exec "imdb-ratings"]
schedule = 0 6 * * *
container = walactv-imdb-ratings
command = python iptv_scrapper/import_imdb_ratings.py --batch-size 10000
no-overlap = true

# IMDb episode imdb_ids: 06:30 UTC daily (after imdb-ratings @ 06:00 to leave time for the ratings job to finish)
[job-exec "imdb-episode-ids"]
schedule = 30 6 * * *
container = walactv-imdb-episode-ids
command = python iptv_scrapper/populate_episode_imdb_ids.py --batch-size 5000
no-overlap = true
