services:
  walactv-proxificaurl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: ["python", "proxificaUrl.py"]
    ports:
      - "3001:3000"
    env_file:
      - .env
    networks:
      - dokploy-network

  walactv-new-scrapper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: ["python", "main.py"]
    env_file:
      - .env
    networks:
      - dokploy-network

  walactv-futboltv:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: walactv-futboltv
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - dokploy-network
    command: ["sh", "-c", "while true; do sleep 3600; done"]

  walactv-sync-iptv:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sync
    container_name: walactv-sync-iptv
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
      - M3U_DIR=/app/data/m3u
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-https://localhost}
    volumes:
      - walactv-m3u:/app/data/m3u
    networks:
      - dokploy-network

  walactv-sync-replays:
    build:
      context: ..
      dockerfile: docker/Dockerfile.replay-sync
    container_name: walactv-sync-replays
    restart: unless-stopped
    command: ["sh", "-c", "trap 'exit 0' TERM INT; while true; do sleep 3600 & wait $!; done"]
    env_file:
      - .env
    networks:
      - dokploy-network

  ofelia:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ofelia
    container_name: ofelia-scheduler
    restart: unless-stopped
    depends_on:
      - walactv-futboltv
      - walactv-sync-iptv
      - walactv-sync-replays
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --config /ofelia.config.ini
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
  iptv-network:
    driver: bridge

volumes:
  walactv-logos:
    external: true
  walactv-m3u:  # 👈 Nuevo volumen para archivos M3U
    driver: local
