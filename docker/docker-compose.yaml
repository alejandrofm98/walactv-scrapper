services:
#  walactv-proxificaurl:
#    build:
#      context: ..
#      dockerfile: docker/Dockerfile
#    restart: unless-stopped
#    command: ["python", "proxificaUrl.py"]
#    ports:
#      - "3001:3000"
#    env_file:
#      - .env
#    networks:
#      - dokploy-network

  walactv-futboltv:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: walactv-futboltv
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - IMAGES_DIR=/app/data/images
    volumes:
      - iptv-data:/app/data
    networks:
      - dokploy-network
      - iptv-ecosystem
    command: ["sh", "-c", "python main.py; trap 'exit 0' TERM INT; while true; do sleep 3600 & wait $!; done"]

  walactv-sync-iptv:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sync
    container_name: walactv-sync-iptv
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
      - M3U_DIR=/app/data/m3u
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-https://localhost}
    volumes:
      - walactv-m3u:/app/data/m3u
      - iptv-data:/app/data
    networks:
      - dokploy-network
      - iptv-ecosystem

  walactv-sync-replays:
    build:
      context: ..
      dockerfile: docker/Dockerfile.replay-sync
    container_name: walactv-sync-replays
    restart: unless-stopped
    command: ["sh", "-c", "trap 'exit 0' TERM INT; while true; do sleep 3600 & wait $!; done"]
    env_file:
      - .env
    networks:
      - dokploy-network
      - iptv-ecosystem

  ofelia:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ofelia
    container_name: ofelia-scheduler
    restart: unless-stopped
    depends_on:
      - walactv-futboltv
      - walactv-sync-iptv
      - walactv-sync-replays
      - walactv-sync-tmdb-metadata
      - walactv-imdb-ratings
      - walactv-imdb-episode-ids
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: daemon --config /ofelia.config.ini
    networks:
      - dokploy-network
      - iptv-ecosystem

  walactv-sync-tmdb-metadata:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tmdb
    container_name: walactv-sync-tmdb-metadata
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.sh"]
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
      - PYTHONUNBUFFERED=1
    networks:
      - dokploy-network
      - iptv-ecosystem

  # Importa ratings de IMDb (title.ratings.tsv.gz) a movies_metadata y series_metadata
  # Se ejecuta diariamente via Ofelia; actualiza solo imdb_rating e imdb_votes.
  walactv-imdb-ratings:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tmdb
    container_name: walactv-imdb-ratings
    restart: unless-stopped
    command: ["sh", "-c", "trap 'exit 0' TERM INT; while true; do sleep 3600 & wait $!; done"]
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
      - PYTHONUNBUFFERED=1
    networks:
      - dokploy-network
      - iptv-ecosystem

  # Puebla series_episodes.imdb_id desde title.episode.tsv.gz
  # Se ejecuta diariamente via Ofelia a las 06:30 UTC (despues de imdb-ratings).
  walactv-imdb-episode-ids:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tmdb
    container_name: walactv-imdb-episode-ids
    restart: unless-stopped
    command: ["sh", "-c", "trap 'exit 0' TERM INT; while true; do sleep 3600 & wait $!; done"]
    env_file:
      - .env
    environment:
      - DOCKER_CONTAINER=true
      - PYTHONUNBUFFERED=1
    networks:
      - dokploy-network
      - iptv-ecosystem

networks:
  dokploy-network:
    external: true
  iptv-ecosystem:
    external: true

volumes:
  walactv-logos:
    external: true
  walactv-m3u:
    driver: local
  iptv-data:
    external: true
