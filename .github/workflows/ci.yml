# .github/workflows/ci.yml
# CI pipeline for walactv-scrapper
# NOTE: depends on iptv-db (shared package). Cloned as sibling for tests.
#
# To run locally (requires act or push to GitHub):
#   act -j lint
#   act -j test

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # iptv-db is a shared package dependency. Clone as sibling repo.
      - name: Clone iptv-db
        uses: actions/checkout@v4
        with:
          repository: alejandrofm98/iptv-db
          path: iptv-db

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./iptv-db
          pip install -e .
          pip install -r requirements-test.txt 2>/dev/null || pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
